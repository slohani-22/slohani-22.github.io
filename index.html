<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #00ff88;
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  position: relative;
  overflow-x: hidden;
}

#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  opacity: 0.22;
  pointer-events: none;
}

#wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

#hero {
  text-align: center;
}

#hero h1 {
  font-size: 64px;
  font-weight: 900;
  color: #00ff88;
  letter-spacing: 4px;
  text-transform: uppercase;
  line-height: 1;
  text-shadow: 0 0 30px rgba(0,255,136,0.3);
}

#hero p {
  color: #444;
  font-size: 13px;
  margin-top: 6px;
  letter-spacing: 2px;
}

#terminal {
  width: 100%;
  background: #0d0d0d;
  border: 1px solid #1e1e1e;
  border-radius: 10px;
  overflow: hidden;
}

#titlebar {
  background: #161616;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #1e1e1e;
}

.dot { width: 13px; height: 13px; border-radius: 50%; }
.dot.red { background: #ff5f57; }
.dot.yellow { background: #febc2e; }
.dot.green { background: #28c840; }
#titlebar span { color: #444; font-size: 13px; margin-left: auto; margin-right: auto; letter-spacing: 1px; }

#output {
  padding: 24px;
  min-height: 420px;
  max-height: 70vh;
  overflow-y: auto;
  font-size: 16px;
  line-height: 2;
}

#output::-webkit-scrollbar { width: 4px; }
#output::-webkit-scrollbar-track { background: #0d0d0d; }
#output::-webkit-scrollbar-thumb { background: #1e1e1e; }

.line { display: block; white-space: pre-wrap; word-break: break-word; }
.info { color: #aaa; }
.hdr { color: #00ff88; font-weight: bold; font-size: 17px; }
.warn { color: #febc2e; }
.err { color: #ff5f57; }
.ok { color: #28c840; }
.dim { color: #333; }
.cyan { color: #00d4ff; }
.white { color: #ffffff; }
.pink { color: #ff6eb4; }

#input-line {

  align-items: center;
  padding: 14px 24px;
  border-top: 1px solid #1e1e1e;
  background: #0d0d0d;
  gap: 10px;
}

#prompt-label {
  color: #00ff88;
  white-space: nowrap;
  font-size: 16px;
  user-select: none;
}

#cmd-input {
  background: transparent;
  border: none;
  outline: none;
  color: #ffffff;
  font-family: 'Courier New', Courier, monospace;

  flex: 1;
  caret-color: #00ff88;
}

.img-wrap {
  margin: 12px 0;
  border-radius: 6px;
  overflow: hidden;
  max-width: 100%;
}

.img-wrap img {

  max-height: none;

  border-radius: 6px;
  border: 1px solid #1e1e1e;

.img-cap {

a { color: #00d4ff; text-decoration: none; }
a:hover { text-decoration: underline; }

<script>

const out = document.getElementById('output');

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addLine(html, cls) {
  const el = document.createElement('span');
  el.className = 'line ' + (cls || 'info');
  el.innerHTML = html;
  out.appendChild(el);
  out.appendChild(document.createElement('br'));
  out.scrollTop = out.scrollHeight;
}

function addBlank() {
  out.appendChild(document.createElement('br'));
}

function addImg(key, caption) {
  const wrap = document.createElement('div');
  wrap.className = 'img-wrap';
  const img = document.createElement('img');
  img.src = PHOTOS[key];
  img.alt = caption;
  const cap = document.createElement('div');
  cap.className = 'img-cap';
  cap.textContent = caption;
  wrap.appendChild(img);
  wrap.appendChild(cap);
  out.appendChild(wrap);
  out.scrollTop = out.scrollHeight;
}

async function typeText(text, cls, delay) {
  delay = delay || 16;
  const el = document.createElement('span');
  el.className = 'line ' + (cls || 'info');
  out.appendChild(el);
  out.appendChild(document.createElement('br'));
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    out.scrollTop = out.scrollHeight;
    await sleep(delay);
  }
}

function processCmd(raw) {
  var cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  addLine('<span class="highlight">sanskar@portfolio:~$</span> <span class="white">' + raw.replace(/</g, '&lt;') + '</span>', 'line');

  if (cmd === 'clear') { out.innerHTML = ''; return; }
  if (cmd === 'help') { showHelp(); return; }
  if (cmd === 'whoami') { showWhoami(); return; }
  if (cmd === 'skills') { showSkills(); return; }
  if (cmd === 'projects') { showProjects(); return; }
  if (cmd === 'certs') { showCerts(); return; }
  if (cmd === 'contact') { showContact(); return; }

  if (eggs[cmd]) {
    addBlank();
    eggs[cmd].lines.forEach(function(t) { addLine(t, 'cyan'); });
    addBlank();
    addImg(cmd, eggs[cmd].caption);
    addBlank();
    return;
  }

  if (secrets[cmd]) {
    addBlank();
    secrets[cmd]();
    addBlank();
    return;
  }

  addLine('command not found: ' + cmd + '   try \'help\'', 'err');
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var val = input.value;
    if (val.trim()) cmdHistory.unshift(val);
    histIdx = -1;
    input.value = '';
    processCmd(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) {
      histIdx++;
      input.value = cmdHistory[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      input.value = cmdHistory[histIdx];
    } else {
      histIdx = -1;
      input.value = '';
    }
  }
});

document.addEventListener('click', function() { input.focus(); });

// Matrix rain
var canvas = document.getElementById('matrix-canvas');
var ctx = canvas.getContext('2d');
var cols, drops;

function initMatrix() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / 20);
  drops = [];
  for (var i = 0; i < cols; i++) drops[i] = Math.random() * -100;
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(10,10,10,0.04)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff66';
  ctx.font = '14px Courier New';
  var chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
  for (var i = 0; i < drops.length; i++) {
    var ch = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(ch, i * 20, drops[i] * 20);
    if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

initMatrix();
setInterval(drawMatrix, 50);
window.addEventListener('resize', initMatrix);

boot();
