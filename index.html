<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #00ff88;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
  }
  #terminal {
    width: 100%;
    max-width: 860px;
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,255,136,0.05);
  }
  #titlebar {
    background: #1a1a1a;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }
  #titlebar span { color: #555; font-size: 13px; margin-left: auto; margin-right: auto; }
  #output {
    padding: 20px;
    min-height: 400px;
    max-height: 75vh;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.8;
    scroll-behavior: smooth;
  }
  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: #0d0d0d; }
  #output::-webkit-scrollbar-thumb { background: #1a1a1a; }
  .line { display: block; white-space: pre-wrap; word-break: break-word; }
  .prompt { color: #00ff88; }
  .cmd { color: #ffffff; }
  .info { color: #888; }
  .highlight { color: #00ff88; }
  .warn { color: #febc2e; }
  .error { color: #ff5f57; }
  .success { color: #28c840; }
  .dim { color: #444; }
  .cyan { color: #00d4ff; }
  .pink { color: #ff6eb4; }
  .section-header { color: #00ff88; font-weight: bold; }
  #input-line {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-top: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  #prompt-label { color: #00ff88; white-space: nowrap; margin-right: 8px; font-size: 14px; }
  #cmd-input {
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: inherit;
    font-size: 14px;
    flex: 1;
    caret-color: #00ff88;
  }
  .img-output {
    margin: 10px 0;
    border-radius: 4px;
    overflow: hidden;
    max-width: 100%;
  }
  .img-output img {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    display: block;
    border-radius: 4px;
    border: 1px solid #1a1a1a;
  }
  .img-caption {
    color: #555;
    font-size: 12px;
    margin-top: 6px;
    font-style: italic;
  }
  .help-grid {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 4px 16px;
    margin: 8px 0;
  }
  .help-cmd { color: #00ff88; }
  .help-desc { color: #666; }
  a { color: #00d4ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor { display: inline-block; width: 8px; height: 14px; background: #00ff88; animation: blink 1s infinite; vertical-align: middle; margin-left: 2px; }
  .tag { background: #1a1a1a; color: #00ff88; padding: 2px 8px; border-radius: 3px; font-size: 12px; margin: 2px; display: inline-block; border: 1px solid #222; }
</style>
</head>

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addLine(text, cls='line info') {
  const el = document.createElement('span');
  el.className = cls;
  el.innerHTML = text;
  out.appendChild(el);
  out.appendChild(document.createElement('br'));
  out.scrollTop = out.scrollHeight;
  return el;
}

function addImg(key, caption) {
  const wrap = document.createElement('div');
  wrap.className = 'img-output';
  const img = document.createElement('img');
  img.src = 'data:image/jpeg;base64,' + PHOTOS[key];
  img.alt = caption;
  const cap = document.createElement('div');
  cap.className = 'img-caption';
  cap.textContent = caption;
  wrap.appendChild(img);
  wrap.appendChild(cap);
  out.appendChild(wrap);
  out.scrollTop = out.scrollHeight;
}

function addBlank() {
  out.appendChild(document.createElement('br'));
}

async function typeText(text, cls='line info', delay=18) {
  const el = document.createElement('span');
  el.className = cls;
  out.appendChild(el);
  out.appendChild(document.createElement('br'));
  for (let ch of text) {
    el.textContent += ch;
    out.scrollTop = out.scrollHeight;
    await sleep(delay);
  }
}

function processCmd(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  addLine('<span class=prompt>sanskar@portfolio:~$</span> <span class=cmd>' + raw.replace(/</g,'&lt;') + '</span>', 'line');

  if (cmd === 'clear') { out.innerHTML = ''; return; }
  if (cmd === 'help') { showHelp(); return; }
  if (cmd === 'whoami') { showWhoami(); return; }
  if (cmd === 'skills') { showSkills(); return; }
  if (cmd === 'projects') { showProjects(); return; }
  if (cmd === 'certs') { showCerts(); return; }
  if (cmd === 'contact') { showContact(); return; }

  if (easterEggs[cmd]) {
    const egg = easterEggs[cmd];
    addBlank();
    egg.text.forEach(t => addLine(t, 'line cyan'));
    addBlank();
    addImg(cmd, egg.caption);
    addBlank();
    return;
  }

  if (secretCmds[cmd]) {
    addBlank();
    secretCmds[cmd]();
    addBlank();
    return;
  }

  addLine('command not found: ' + cmd + '. Type 'help' for available commands.', 'line error');
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    history.unshift(val);
    histIdx = -1;
    input.value = '';
    processCmd(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) {
      histIdx++;
      input.value = history[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      input.value = history[histIdx];
    } else {
      histIdx = -1;
      input.value = '';
    }
  }
});

document.addEventListener('click', () => input.focus());
